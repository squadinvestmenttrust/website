<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Squad Investment Trust Dashboard">
    <title>Squad Investment Trust 🤘⚡</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Intense Neon Palette for Glam Metal Theme */
            --neon-pink: #ff007f;
            --hot-pink: #ff1493;
            --neon-blue: #00f0ff;
            --neon-purple: #b000ff;
            --neon-yellow: #ffea00;
            --dark-bg: #000000; 
            --panel-bg: #0a0a0a;
            --panel-bg-light: #111111;
            
            /* Enhanced Glowing Borders */
            --border-glow-pink: 0 0 15px rgba(255,0,127,0.6), inset 0 0 10px rgba(255,0,127,0.3);
            --border-glow-blue: 0 0 15px rgba(0,240,255,0.6), inset 0 0 10px rgba(0,240,255,0.3);
            --border-glow-purple: 0 0 20px rgba(176,0,255,0.7), inset 0 0 10px rgba(176,0,255,0.3);
            
            --font-family: 'Nunito', sans-serif;
            --font-metal: 'Metal Mania', cursive;
            
            --positive-green: #39ff14; 
            --negative-red: #ff003c; 
            --text-light: #e0e0e0;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* Custom Neon Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
            border-left: 1px solid #222;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-purple);
            border-radius: 5px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-pink);
        }

        /* GLAM ROCK BACKGROUND with subtle stage spotlights */
        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: var(--font-family);
            margin: 0;
            padding: 0 0 20px 0;
            font-size: 15px;
            overflow-x: hidden;
            width: 100%; 
            min-height: 100vh;
            position: relative;
        }

        /* Stage Lights Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 15% 30%, rgba(255, 0, 127, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 70%, rgba(0, 240, 255, 0.08) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        .ticker-wrap {
            width: 100%;
            background: repeating-linear-gradient(90deg, #000, #000 10px, #0a0a0a 10px, #0a0a0a 20px);
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
            border-bottom: 2px solid var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
            display: none; 
            will-change: transform; 
        }
        .ticker-text {
            display: inline-block;
            color: var(--neon-yellow);
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-yellow), 0 0 15px #ff8800;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .main-container {
            max-width: 1100px;
            margin: auto;
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 20px 15px;
        }

        @keyframes electric-wiggle {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(1.5deg) scale(1.02); }
            50% { transform: rotate(0deg) scale(1.02); }
            75% { transform: rotate(-1.5deg) scale(1.02); }
            100% { transform: rotate(0deg); }
        }
        .wiggle-hover {
            transition: transform 0.15s ease, box-shadow 0.2s ease, z-index 0.2s ease, border-color 0.2s;
            will-change: transform;
        }
        .wiggle-hover:hover {
            animation: electric-wiggle 0.3s ease-in-out infinite;
            z-index: 10;
            box-shadow: var(--border-glow-blue) !important;
            border-color: var(--neon-blue) !important;
        }

        @keyframes neon-pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink); }
            50% { transform: scale(1.06); text-shadow: 0 0 25px var(--neon-pink), 0 0 40px var(--hot-pink), 0 0 10px white; }
            100% { transform: scale(1); text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink); }
        }

        @keyframes text-flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
            20%, 24%, 55% { opacity: 0.5; text-shadow: none; }
        }

        @keyframes randomPop {
            0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
            30% { transform: scale(1.05) rotate(2deg); filter: brightness(1.5) contrast(1.2); box-shadow: 0 0 30px #fff; }
            50% { transform: scale(0.96) rotate(-2deg); filter: brightness(0.8); }
            70% { transform: scale(1.03) rotate(1deg); filter: brightness(1.3); }
            100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
        }
        .random-pop {
            animation: randomPop 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            z-index: 50;
            border-color: #fff !important;
            box-shadow: 0 0 25px #fff !important;
        }

        #imageContainer {
            background: transparent; 
            box-shadow: none; 
            padding: 0;
            margin-bottom: 20px;
            width: 100%;
            text-align: center;
            min-height: 120px; 
        }
        
        #imageContainer img {
            display: block;
            margin: auto;
            max-width: 100% !important;
            height: auto !important;
        }

        .tagline-container {
            text-align: center;
            margin-top: 10px;
            perspective: 1000px;
            padding: 0 10px;
        }
        .tagline {
            display: inline-block;
            font-family: var(--font-metal);
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-purple), 0 0 40px #5000ff;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            will-change: transform;
            animation: text-flicker 5s infinite;
        }
        .tagline:hover {
            transform: rotateX(360deg) scale(1.2);
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink);
        }

        .loading-section {
            text-align: center;
            margin-bottom: 2rem;
            background: repeating-linear-gradient(45deg, #111, #111 10px, #0a0a0a 10px, #0a0a0a 20px);
            border-radius: 10px;
            padding: 25px;
            box-shadow: var(--border-glow-pink);
            border: 2px solid var(--neon-pink);
            width: 100%;
            min-height: 85px; 
            text-transform: uppercase;
        }

        .header-text {
            min-height: 1.2em;
            font-size: 1.5rem;
            font-family: var(--font-metal);
            letter-spacing: 3px;
            margin: 8px 0;
            color: var(--neon-blue);
            word-wrap: break-word;
            transition: color 0.3s ease, transform 0.3s ease;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8);
        }

        .metrics-container {
            display: none; 
            justify-content: space-around;
            align-items: stretch;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
        }

        .metric-item {
            text-align: center;
            flex: 1;
            min-width: 120px;
            padding: 20px 15px;
            border-radius: 12px;
            background: var(--panel-bg);
            /* Amp Grille Texture */
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 4px 4px;
            border: 2px solid var(--neon-purple);
            box-shadow: var(--border-glow-purple);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .metric-label {
            font-size: 0.9rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            word-wrap: break-word;
            text-shadow: 0 0 5px #fff;
        }

        /* Guitar Stripe Background for AUM */
        .metric-main {
            flex: 1.5;
            background: repeating-linear-gradient(
                -45deg,
                #000,
                #000 15px,
                #1a0005 15px,
                #1a0005 30px
            );
            border: 3px solid var(--neon-pink);
            transform: scale(1.08);
            box-shadow: var(--border-glow-pink);
            z-index: 2;
        }
        .metric-main .metric-label {
            font-size: 1.1rem;
            color: var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink);
        }
        .metric-main .metric-value {
            font-size: 2.5rem;
            color: #fff;
            font-weight: 900;
            text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink);
            animation: neon-pulse 2s infinite ease-in-out;
            will-change: transform;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-bottom: 2.5rem;
            width: 100%;
        }

        .hud-panel {
            background-color: var(--panel-bg);
            /* Speaker Mesh Texture */
            background-image: radial-gradient(rgba(255,255,255,0.03) 2px, transparent 2px);
            background-size: 8px 8px;
            border-radius: 12px;
            padding: 30px 20px 20px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.9), inset 0 0 15px rgba(0,0,0,0.8);
            border: 2px solid #2a2a2a; 
            position: relative;
            width: 100%;
        }
        
        .hud-title {
            position: absolute;
            top: -20px;
            left: 20px;
            background: #000;
            color: var(--neon-blue);
            padding: 6px 20px;
            font-family: var(--font-metal);
            font-size: 1.3rem;
            letter-spacing: 3px;
            border-radius: 4px;
            box-shadow: 0 0 15px var(--neon-blue);
            border: 2px solid var(--neon-blue);
            white-space: nowrap;
            z-index: 2;
            text-transform: uppercase;
            animation: text-flicker 4s infinite alternate;
            transform: skewX(-10deg);
        }
        .hud-title span {
            display: inline-block;
            transform: skewX(10deg); /* Counter skew for text */
        }

        #returns-table-container, #graph-container {
            width: 100%;
            overflow-x: auto;
        }

        .holdings-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            width: 100%;
            margin-top: 15px;
        }

        .holding-card {
            background: linear-gradient(145deg, #151515, #0a0a0a);
            border: 1px solid #444;
            padding: 10px 12px; 
            border-radius: 8px; 
            min-width: 0; 
            cursor: pointer;
            width: 100%;
            color: #ddd;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .holding-name {
            font-weight: 900;
            font-size: 1rem; 
            color: #fff;
            display: block;
            margin-bottom: 6px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 3px rgba(255,255,255,0.3);
        }

        .holding-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem; 
            font-weight: 700;
            margin-bottom: 4px; 
            color: #aaa;
        }
        
        svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }
        .chart-tooltip {
            position: absolute;
            background: #000;
            color: #fff;
            border: 2px solid var(--neon-pink);
            border-radius: 4px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 900;
            pointer-events: none;
            display: none;
            z-index: 100;
            box-shadow: 0 0 20px var(--neon-pink);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .pie-slice {
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            transform-origin: center;
        }
        .pie-slice:hover { 
            opacity: 0.9; 
            transform: scale(1.08);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }
        
        .line-path {
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: drawLine 2s ease-out forwards;
            filter: drop-shadow(0px 0px 10px var(--neon-pink)) drop-shadow(0px 0px 5px var(--neon-purple));
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        .returns-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 1rem;
            margin-top: 15px;
            min-width: 250px; 
        }
        .returns-table td, .returns-table th {
            border-bottom: 1px solid #333;
            padding: 16px 10px; 
            text-align: left;
            font-weight: 700;
        }
        .returns-table th { 
            color: var(--neon-purple);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid var(--neon-purple);
            text-shadow: 0 0 5px rgba(176,0,255,0.5);
        }
        .returns-table td:last-child, .returns-table th:last-child {
            text-align: right;
        }
        .returns-table tr:hover td {
            background: rgba(255,255,255,0.05);
        }
        .returns-table tr:last-child td {
            border-bottom: none;
        }

        .cursor::after {
            content: ' ⚡';
            color: var(--neon-blue);
            animation: blink 1s step-end infinite;
            display: inline-block;
            vertical-align: middle;
            margin-bottom: 2px;
            text-shadow: 0 0 8px var(--neon-blue);
        }
        @keyframes blink { 50% { opacity: 0; } }

        #updatesContainer {
            font-size: 1rem;
            line-height: 1.6;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .update-entry {
            background: linear-gradient(90deg, #111, #0a0a0a);
            color: #eee;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 5px solid #fff; 
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            display: inline-block;
            max-width: 100%;
            position: relative;
            cursor: pointer;
            word-wrap: break-word;
            letter-spacing: 0.5px;
        }
        
        .log-buy { border-left-color: var(--positive-green); box-shadow: -3px 0 15px rgba(57,255,20,0.3), 0 5px 15px rgba(0,0,0,0.6); }
        .log-sell { border-left-color: var(--negative-red); box-shadow: -3px 0 15px rgba(255,0,60,0.3), 0 5px 15px rgba(0,0,0,0.6); }
        .log-paid { border-left-color: var(--neon-yellow); box-shadow: -3px 0 15px rgba(255,234,0,0.3), 0 5px 15px rgba(0,0,0,0.6); }

        .poll-wrapper {
            background: var(--panel-bg);
            background-image: radial-gradient(rgba(255,255,255,0.03) 2px, transparent 2px);
            background-size: 8px 8px;
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--border-glow-blue);
            border: 2px solid var(--neon-blue);
            text-align: center;
            margin-top: 2.5rem;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .squad-btn {
            background: linear-gradient(45deg, #000, #1a000d);
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            border-radius: 6px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: var(--font-metal);
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6), inset 0 0 10px rgba(255, 0, 127, 0.2);
            transition: all 0.2s ease;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .squad-btn:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 30px var(--neon-pink), 0 0 60px var(--hot-pink);
            text-shadow: none;
            transform: translateY(-2px);
        }

        .squad-btn:active {
            transform: scale(0.95) translateY(0);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        @keyframes fallAndSpin {
            0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
            50% { transform: translateY(40vh) rotate(360deg) scale(1.5); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(1); opacity: 0; }
        }

        .emoji-drop {
            position: fixed;
            top: -10vh;
            z-index: 9999;
            pointer-events: none;
            animation: fallAndSpin linear forwards;
            will-change: transform, opacity;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
        }

        @media (max-width: 800px) {
            .dashboard-grid { 
                grid-template-columns: 1fr; 
                gap: 3rem; 
            }
            .main-container { 
                padding: 15px 10px; 
            } 
            .metric-main { 
                transform: scale(1); 
            }
        }

        @media (max-width: 600px) {
            body {
                font-size: 14px;
            }
            .main-container {
                padding: 10px 5px;
            }
            .tagline {
                font-size: 1.4rem;
            }
            .metrics-container {
                flex-direction: column; 
                gap: 15px;
            }
            .metric-item {
                width: 100%;
                min-width: unset;
                padding: 15px 10px;
            }
            .metric-label {
                font-size: 0.8rem;
            }
            .metric-value {
                font-size: 1.3rem;
            }
            .metric-main .metric-value {
                font-size: 1.8rem;
            }
            .hud-panel {
                padding: 35px 15px 20px 15px;
            }
            .hud-title {
                font-size: 1rem;
                padding: 6px 15px;
                left: 10px;
                top: -16px;
            }
            .returns-table td, .returns-table th {
                padding: 12px 5px; 
                font-size: 0.9rem;
            }
            #pie-chart-container {
                width: 100% !important; 
            }
            .update-entry {
                font-size: 0.9rem;
                padding: 12px 15px;
            }
            .squad-btn {
                font-size: 1.2rem;
                padding: 12px 20px;
            }
        }
    </style>
</head>

</div>

<script>
    const tickerWrapEl = document.getElementById('ticker-wrap');
    const tickerTextEl = document.getElementById('ticker-text');
    const loadingContainerEl = document.getElementById('loading-container');
    const loadingTextEl = document.getElementById('loading-text');
    const metricsContainerEl = document.getElementById('metrics-container');
    
    const aumTextEl = document.getElementById('aum-text');
    const unitPriceTextEl = document.getElementById('unitprice-text');
    const tendiesTextEl = document.getElementById('tendies-text');
    
    const tableContainerEl = document.getElementById('table-container');
    const pieChartContainerEl = document.getElementById('pie-chart-container');
    const returnsTableContainerEl = document.getElementById('returns-table-container');
    const graphContainerEl = document.getElementById('graph-container');
    const tooltipEl = document.getElementById('tooltip');

    const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvIkFEd8DqGzQOSMan7QNAuwDI4fXgD1HB8PDbmnnqk5QmA0YNigbxyWuuKhoAys9VRKrbDqym2xDw/pub?output=csv';

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }

    async function typeText(element, text, speed = 30) {
        element.classList.add('cursor');
        element.innerHTML = "";
        let currentText = "";
        for (let i = 0; i < text.length; i++) {
            currentText += escapeHTML(text.charAt(i));
            element.innerHTML = currentText;
            await sleep(speed + Math.random() * 20);
        }
        element.classList.remove('cursor');
    }

    async function typeDots(element, count = 3, speed = 300) {
        element.classList.add('cursor');
        for (let i = 0; i < count; i++) {
            element.textContent += '.';
            await sleep(speed);
        }
        element.classList.remove('cursor');
    }

    function parseCSV(str) {
        const arr = [];
        let quote = false; 
        let col, c;
        for (let row = col = c = 0; c < str.length; c++) {
            const cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';

            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }
            
            arr[row][col] += cc;
        }
        return arr;
    }

    async function getSheetData() {
        try {
            const response = await fetch(SPREADSHEET_URL);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const csvText = await response.text();
            return parseCSV(csvText);
        } catch (e) {
            console.error("Error:", e);
            loadingTextEl.textContent = "💀 Oopsie! Data link severed~ 💀";
            return null;
        }
    }

    function drawTable(data) {
        const holdings = data.slice(2).filter(row => row[0]);
        const fmtUSD0 = (n) => {
            const num = parseFloat(n);
            if (isNaN(num)) return escapeHTML(n) || '$0';
            return num.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
        };
        const fmtPct = (v) => {
            const raw = (v ?? '').toString().trim();
            if (raw === '') return '0%';
            if (raw.endsWith('%')) return escapeHTML(raw);
            const num = parseFloat(raw);
            return isNaN(num) ? escapeHTML(raw) : `${num.toFixed(2)}%`;
        };

        let html = '<div class="holdings-grid-container">';
        
        const createCard = (item) => {
            if(!item) return '';
            const name = escapeHTML(item[0] || 'N/A');
            const value = fmtUSD0(item[3]); 
            const dailyChange = fmtPct(item[13]); 
            const profit = fmtPct(item[6]);
            
            const dailyVal = parseFloat(dailyChange);
            const profitVal = parseFloat(profit);

            let bgStyle = ''; 
            if (!isNaN(dailyVal) && dailyChange !== '0%') {
                if (dailyVal > 0) {
                    const intensity = Math.min(0.05 + (dailyVal / 10), 0.3); 
                    bgStyle = `background: linear-gradient(145deg, rgba(57, 255, 20, ${intensity}), #0a0a0a); border-color: var(--positive-green); box-shadow: inset 0 0 15px rgba(57,255,20,0.2), 3px 3px 10px rgba(0,0,0,0.5);`;
                } else if (dailyVal < 0) {
                    const intensity = Math.min(0.05 + (Math.abs(dailyVal) / 10), 0.3);
                    bgStyle = `background: linear-gradient(145deg, rgba(255, 0, 60, ${intensity}), #0a0a0a); border-color: var(--negative-red); box-shadow: inset 0 0 15px rgba(255,0,60,0.2), 3px 3px 10px rgba(0,0,0,0.5);`;
                }
            }

            const profitColor = profitVal < 0 ? 'var(--negative-red)' : 'var(--positive-green)';
            const dailyColor = dailyVal < 0 ? 'var(--negative-red)' : (dailyVal > 0 ? 'var(--positive-green)' : 'var(--text-light)');

            return `
                <div class="holding-card wiggle-hover" style="${bgStyle}">
                    <span class="holding-name" title="${name}">${name}</span>
                    <div class="holding-row"><span>Val:</span><span style="color:#fff; text-shadow:0 0 3px #fff;">${value}</span></div>
                    <div class="holding-row"><span>P/L:</span><span style="color:${profitColor}; text-shadow:0 0 5px ${profitColor};">${profit}</span></div>
                    <div class="holding-row"><span>Day:</span><span style="color:${dailyColor}; font-weight:900; text-shadow: 0 0 8px ${dailyColor};">${dailyChange}</span></div>
                </div>
            `;
        }

        if (holdings.length > 0) {
            const cashItem = holdings[0];
            const name = escapeHTML(cashItem[0] || 'Cash');
            const value = fmtUSD0(cashItem[3]); 

            html += `
                <div class="holding-card wiggle-hover" style="grid-column: 1 / -1; background: #050505; border: 2px solid var(--neon-blue); text-align: center; padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(0,240,255,0.3), inset 0 0 10px rgba(0,240,255,0.1);">
                    <span class="holding-name" title="${name}" style="font-size: 1.2rem; color: var(--neon-blue); margin-bottom: 4px; text-shadow: 0 0 5px var(--neon-blue);">${name}</span>
                    <div style="font-size: 1.9rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(0,240,255,0.8);">${value}</div>
                </div>
            `;
        }
        
        for (let i = 1; i < holdings.length; i++) {
            if(holdings[i] && holdings[i][0]) html += createCard(holdings[i]);
        }

        const debtRaw = data[1] ? data[1][6] : undefined;
        const debtValue = debtRaw ? fmtUSD0(debtRaw) : '$0';
        
        html += `
            <div class="holding-card wiggle-hover" style="grid-column: 1 / -1; background: #050505; border: 2px solid var(--negative-red); text-align: center; padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(255,0,60,0.3), inset 0 0 10px rgba(255,0,60,0.1); margin-top: 5px;">
                <span class="holding-name" title="DEBT" style="font-size: 1.2rem; color: var(--negative-red); margin-bottom: 4px; text-shadow: 0 0 5px var(--negative-red);">DEBT</span>
                <div style="font-size: 1.9rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,0,60,0.8);">${debtValue}</div>
            </div>
        `;

        html += '</div>';
        tableContainerEl.innerHTML = html;
    }

    function drawPieChart(data) {
        const holdingsData = data.slice(2)
            .filter(row => row[0] && parseFloat(row[3]) > 0)
            .map(row => ({ name: row[0], value: parseFloat(row[3]) }));

        const totalValue = holdingsData.reduce((sum, item) => sum + item.value, 0);
        if (totalValue === 0) {
            pieChartContainerEl.innerHTML = '<div style="text-align:center; font-weight:bold; color: var(--neon-pink);">NO ASSETS 💀</div>';
            return;
        }

        const radius = 100;
        const cx = radius;
        const cy = radius;
        let startAngle = -90;

        let svgContent = `<svg viewBox="-10 -10 ${radius * 2 + 20} ${radius * 2 + 20}" preserveAspectRatio="xMidYMid meet">`;

        // Bright Neon Array
        const glamColors = ['#ff007f', '#00f0ff', '#39ff14', '#b000ff', '#ffea00', '#ff003c', '#ff00ff', '#00ffff', '#a8ff00'];

        holdingsData.forEach((item, index) => {
            const percentage = item.value / totalValue;
            const angle = percentage * 360;
            const endAngle = startAngle + angle;

            const start = polarToCartesian(cx, cy, radius, endAngle);
            const end = polarToCartesian(cx, cy, radius, startAngle);
            const largeArcFlag = angle > 180 ? "1" : "0";

            const d = [
                "M", cx, cy,
                "L", end.x, end.y,
                "A", radius, radius, 0, largeArcFlag, 1, start.x, start.y,
                "Z"
            ].join(" ");

            const fill = glamColors[index % glamColors.length];
            const cleanName = escapeHTML(item.name);
            const tooltipText = escapeHTML(`${cleanName}: ${item.value.toLocaleString('en-US', {style:'currency', currency:'USD', maximumFractionDigits:0})} (${Math.round(percentage*100)}%)`).replace(/'/g, "\\'");

            svgContent += `<path d="${d}" fill="${fill}" stroke="#000" stroke-width="3" class="pie-slice" 
                           ontouchstart="showTooltip(event.touches[0], '${tooltipText}')"
                           onmousemove="showTooltip(evt, '${tooltipText}')" 
                           onmouseout="hideTooltip()"></path>`;
            
            startAngle = endAngle;
        });

        // Add a dark circle in the middle for a "donut/vinyl record" look
        svgContent += `<circle cx="${cx}" cy="${cy}" r="25" fill="#000" stroke="#222" stroke-width="2" />`;

        svgContent += `</svg>`;
        pieChartContainerEl.innerHTML = svgContent;
    }

    function showTooltip(evt, text) {
        tooltipEl.style.display = "block";
        tooltipEl.innerHTML = text; 
        tooltipEl.style.left = (evt.pageX + 15) + 'px';
        tooltipEl.style.top = (evt.pageY + 15) + 'px';
    }

    function hideTooltip() {
        tooltipEl.style.display = "none";
    }

    function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
        const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
        return {
            x: centerX + (radius * Math.cos(angleInRadians)),
            y: centerY + (radius * Math.sin(angleInRadians))
        };
    }

    function drawLineGraph(data) {
        const graphData = data.slice(1)
            .filter(row => row[7] && row[8])
            .map(row => {
                const dateParts = row[7].split('/');
                return {
                    date: new Date(`${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`),
                    value: parseFloat(row[8])
                };
            })
            .sort((a, b) => a.date - b.date);

        if (graphData.length < 2) return;

        const width = 800;
        const height = 400;
        const padding = 65;

        const maxValue = Math.max(...graphData.map(d => d.value));
        const yMax = Math.ceil(maxValue / 10000) * 10000;
        
        const startDate = new Date('2017-01-01');
        const today = new Date();
        const theEndDate = new Date(today.getFullYear() + 1, 0, 1);

        const xScale = (date) => padding + ((date - startDate) / (theEndDate - startDate)) * (width - padding * 2);
        const yScale = (value) => height - padding - (value / yMax) * (height - padding * 2);

        let svgContent = `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" style="margin-top: 15px;">`;

        svgContent += `<line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="#555" stroke-width="3" stroke-linecap="round"></line>`;
        svgContent += `<line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#555" stroke-width="3" stroke-linecap="round"></line>`;

        for (let i = 0; i <= yMax; i += 10000) {
            const y = yScale(i);
            svgContent += `<line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#222" stroke-width="2" stroke-dasharray="8,8"></line>`;
            svgContent += `<text x="${padding - 15}" y="${y + 6}" fill="#ccc" text-anchor="end" font-size="16" font-weight="900" style="text-shadow: 0 0 5px #000;">$${i / 1000}K</text>`;
        }

        for (let year = 2017; year <= today.getFullYear() + 1; year++) {
            const x = xScale(new Date(`${year}-01-01`));
            svgContent += `<text x="${x}" y="${height - padding + 30}" fill="#ccc" text-anchor="middle" font-size="16" font-weight="900" style="text-shadow: 0 0 5px #000;">${year}</text>`;
        }
        
        const points = graphData.map(d => `${xScale(d.date)},${yScale(d.value)}`).join(' ');
        
        svgContent += `<polyline points="${points}" fill="none" stroke="var(--neon-pink)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" class="line-path"></polyline>`;
        
        svgContent += `</svg>`;
        graphContainerEl.innerHTML = svgContent;
    }

    function drawReturnsTable(data) {
        const safeGet = (r, c) => (data[r] && typeof data[r][c] !== 'undefined') ? escapeHTML(data[r][c]) : '';
        const periods = [
            { label: '1 Month', val: safeGet(1, 11) },
            { label: '3 Month', val: safeGet(2, 11) },
            { label: '6 Month', val: safeGet(3, 11) },
            { label: '1 Year', val: safeGet(4, 11) },
            { label: '2 Year', val: safeGet(5, 11) }
        ];

        let html = '<table class="returns-table">';
        html += '<thead><tr><th>PERIOD</th><th>RETURN</th></tr></thead><tbody>';
        
        periods.forEach(p => {
            let color = 'var(--positive-green)';
            let valStr = p.val;
            if(valStr && valStr.includes('-')) color = 'var(--negative-red)';
            
            if(!valStr.includes('%') && valStr !== '') {
                const f = parseFloat(valStr);
                if(!isNaN(f)) valStr = f.toFixed(2) + '%';
            }

            html += `<tr><td style="color:#ddd;">${p.label}</td><td style="color:${color}; font-weight:900; font-size:1.2rem; text-shadow:0 0 8px ${color};">${valStr}</td></tr>`;
        });
        html += '</tbody></table>';
        returnsTableContainerEl.innerHTML = html;
    }

    function loadPortfolioUpdates(data) {
        const updates = data.slice(1)
            .map(row => row[9])
            .filter(item => item && item.trim() !== '');

        const container = document.getElementById('updatesContainer');
        container.innerHTML = '';

        if (updates.length === 0) {
            container.innerHTML = '<div style="text-align:center; opacity:0.6; font-weight:bold; color: #fff;">No recent updates 🦇</div>';
            return;
        }

        updates.forEach((update) => {
            const div = document.createElement('div');
            let extraClass = '';
            let emoji = '⚡'; 
            const upperText = update.toUpperCase();
            
            if (upperText.includes('BUY')) {
                extraClass = 'log-buy'; emoji = '🎸';
            } else if (upperText.includes('SELL') || upperText.includes('SOLD')) {
                extraClass = 'log-sell'; emoji = '🔥';
            } else if (upperText.includes('PAID')) {
                extraClass = 'log-paid'; emoji = '💰';
            }

            div.className = `update-entry wiggle-hover ${extraClass}`;
            div.innerHTML = `<span style="margin-right:8px; font-size:1.2rem; text-shadow:0 0 5px #fff;">${emoji}</span> ${escapeHTML(update)}`;
            container.appendChild(div);
        });
    }

    let wobbleElements = [];
    
    function startRandomWobbles() {
        if(wobbleElements.length === 0) {
            wobbleElements = Array.from(document.querySelectorAll('.hud-panel, .metric-item, .holding-card, .poll-wrapper'));
        }

        if (wobbleElements.length > 0) {
            const numToAnimate = Math.floor(Math.random() * 2) + 1;
            for(let i=0; i<numToAnimate; i++) {
                const el = wobbleElements[Math.floor(Math.random() * wobbleElements.length)];
                if(!el.classList.contains('random-pop')) {
                    el.classList.add('random-pop');
                    setTimeout(() => el.classList.remove('random-pop'), 500);
                }
            }
        }
        
        const nextTime = Math.random() * 3000 + 1500;
        setTimeout(startRandomWobbles, nextTime);
    }

    document.getElementById('emojiRainBtn').addEventListener('click', function(e) {
        e.preventDefault();
        
        const emojis = ['🤘', '⚡', '🎸', '🦇', '🖤', '💀', '💥', '🎤', '🥁', '🎶'];
        
        for (let i = 0; i < 60; i++) {
            setTimeout(() => {
                const drop = document.createElement('div');
                drop.classList.add('emoji-drop');
                drop.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.fontSize = (Math.random() * 2.5 + 1.5) + 'rem';
                
                const duration = Math.random() * 2 + 2; 
                drop.style.animationDuration = duration + 's';
                
                document.body.appendChild(drop);
                
                setTimeout(() => drop.remove(), duration * 1000);
            }, i * 35);
        }
    });

    async function main() {
        const dataPromise = getSheetData();

        await typeText(loadingTextEl, 'CRANKING AMPS TO 11 🎸', 30);
        await typeDots(loadingTextEl, 4, 150);
        await sleep(200);
        
        const sheetData = await dataPromise;
        
        if (!sheetData) return;

        if (sheetData[0] && sheetData[0].length > 9 && sheetData[0][9]) {
            tickerTextEl.innerHTML = escapeHTML(sheetData[0][9]);
            tickerWrapEl.style.display = 'block';
        }

        loadingTextEl.innerHTML = '';
        await typeText(loadingTextEl, 'FOUND 6 and 7!, ROCKING OUT 🤘', 30);
        await typeDots(loadingTextEl, 4, 150);
        await sleep(300);
        
        let todayChangeStr = (sheetData[0] && sheetData[0].length > 14 && sheetData[0][14]) ? escapeHTML(sheetData[0][14].trim()) : "$0";
        let todayChangeVal = parseFloat(todayChangeStr.replace(/[^0-9.-]+/g,"")) || 0;

        loadingTextEl.innerHTML = ''; 
        let finalMessage = "";

        if (todayChangeVal >= 0) {
            finalMessage = `YOU'RE UP ${todayChangeStr}% TODAY! 🔥`;
            loadingTextEl.style.color = 'var(--positive-green)';
            loadingTextEl.style.textShadow = '0 0 15px var(--positive-green), 0 0 30px #fff';
            loadingTextEl.style.transform = 'scale(1.1)';
        } else {
            finalMessage = `YOU'RE DOWN ${todayChangeStr.replace('-', '')}% TODAY! 💀`;
            loadingTextEl.style.color = 'var(--negative-red)';
            loadingTextEl.style.textShadow = '0 0 15px var(--negative-red), 0 0 30px #fff';
            loadingTextEl.style.transform = 'scale(1.1)';
        }
        
        loadingTextEl.style.transition = 'all 0.3s ease';
        
        await typeText(loadingTextEl, finalMessage, 30);
        await sleep(2500); 

        loadingContainerEl.style.display = 'none';
        metricsContainerEl.style.display = 'flex';

        const jokingValue = parseFloat(sheetData[1][3]).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }) || '$0';
        const unitRaw = sheetData[1][4];
        const unitPrice = parseFloat(unitRaw).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
        const tendiesValue = parseFloat(sheetData[1][5]).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }) || '$0';

        aumTextEl.textContent = jokingValue;
        unitPriceTextEl.textContent = unitPrice;
        tendiesTextEl.textContent = tendiesValue;
        
        drawTable(sheetData);
        drawPieChart(sheetData);
        drawReturnsTable(sheetData);
        drawLineGraph(sheetData);
        loadPortfolioUpdates(sheetData);

        setTimeout(startRandomWobbles, 2000);
    }

    window.onload = main;

</script>
</body>
</html>
