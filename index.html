<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Squad Investment Trust Dashboard - Broke Edition">
    <title>Squad Investment Trust 🗑️🏚️</title>
    
    <!-- Preconnecting to speed up font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+New:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* --- BROKE & GROSS THEME PALETTE --- */
            --main-dirt: #7c644d; /* Cardboard brown */
            --dark-grime: #3e3125; /* Dark shadow/dirt */
            --light-rubbish: #c4b7a5; /* Lighter beige/grey */
            --dirty-white: #ffffff; /* UPDATED: Pure white background as requested */
            --accent-rust: #9c3b2b; /* Rust/red-brown */
            --muted-green: #5a7247; /* Moldy green for 'positive' */
            
            --bg-gradient-1: #9c9182;
            --bg-gradient-2: #b8ad9e;
            
            --font-family: 'Courier New', monospace; /* Monospace for typewriter/hand-scrawled look */
        }

        /* --- PREVENT HORIZONTAL SCROLLING --- */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* --- GRIMY BACKGROUND & TEXTURE --- */
        body {
            background: var(--dirty-white);
            background-image: url('https://i.ibb.co/M0bq2Hr/Broke.jpg'); /* Fallback/Texture hint */
            background-size: cover;
            background-blend-mode: overlay;
            background-attachment: fixed;
            color: var(--dark-grime);
            font-family: var(--font-family);
            margin: 0;
            padding: 0 0 20px 0;
            font-size: 15px;
            overflow-x: hidden;
            width: 100%; 
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); /* UPDATED: Lighter white overlay */
            pointer-events: none;
            z-index: -1;
        }

        /* --- TICKER --- */
        .ticker-wrap {
            width: 100%;
            background-color: var(--light-rubbish);
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
            border-bottom: 2px solid var(--main-dirt);
            display: none; 
            will-change: transform;
        }
        .ticker-text {
            display: inline-block;
            color: var(--dark-grime);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
            padding-left: 100%;
            animation: ticker 20s linear infinite; /* UPDATED: Faster ticker speed */
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .main-container {
            max-width: 1100px;
            margin: auto;
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 20px 10px;
        }

        /* --- JANKY ANIMATIONS --- */
        @keyframes wiggle {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(1deg) scale(1.01); }
            50% { transform: rotate(0deg) scale(1.01); }
            75% { transform: rotate(-1deg) scale(1.01); }
            100% { transform: rotate(0deg); }
        }
        .wiggle-hover {
            transition: transform 0.2s ease, z-index 0.2s ease, box-shadow 0.2s ease;
            will-change: transform;
        }
        .wiggle-hover:hover {
            animation: wiggle 0.5s ease-in-out infinite;
            z-index: 10;
            box-shadow: 2px 2px 5px var(--dark-grime) !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- RANDOM SPONTANEOUS POP ANIMATION --- */
        @keyframes randomPop {
            0% { transform: scale(1) rotate(0deg); }
            30% { transform: scale(1.04) rotate(1deg); }
            50% { transform: scale(0.98) rotate(-1deg); }
            70% { transform: scale(1.02) rotate(0.5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .random-pop {
            animation: randomPop 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            z-index: 50;
        }

        /* --- HEADER & IMAGES --- */
        #imageContainer {
            background: transparent; 
            box-shadow: none; 
            padding: 0;
            margin-bottom: 20px;
            width: 100%;
            text-align: center;
            min-height: 120px;
        }
        
        #imageContainer img {
            display: block;
            margin: auto;
            max-width: 100% !important;
            height: auto !important;
            mix-blend-mode: multiply; /* Blends the image into the dirty background */
            filter: contrast(1.1) sepia(0.2); /* Enhances the grimy look */
        }

        .tagline-container {
            text-align: center;
            margin-top: 10px;
            perspective: 1000px;
            padding: 0 10px;
        }
        .tagline {
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--accent-rust);
            text-shadow: 1px 1px 0px var(--dark-grime);
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            will-change: transform;
            font-family: var(--font-family);
        }
        .tagline:hover {
            transform: rotateX(360deg) scale(1.1);
        }

        /* --- LAYOUT UTILS --- */
        .loading-section {
            text-align: center;
            margin-bottom: 2rem;
            background: var(--light-rubbish);
            border-radius: 5px;
            padding: 20px;
            box-shadow: 2px 2px 0px var(--main-dirt);
            border: 2px solid var(--dark-grime);
            width: 100%;
            min-height: 85px;
        }

        .header-text {
            min-height: 1.2em;
            font-size: 1.2rem;
            font-weight: 700;
            margin: 8px 0;
            color: var(--dark-grime);
            word-wrap: break-word;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        /* --- NEW METRICS HEADER --- */
        .metrics-container {
            display: none; 
            justify-content: space-around;
            align-items: stretch;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
        }

        .metric-item {
            text-align: center;
            flex: 1;
            min-width: 120px;
            padding: 15px 10px;
            border-radius: 8px;
            background: var(--light-rubbish);
            border: 2px solid var(--main-dirt);
            box-shadow: 3px 3px 0px var(--dark-grime);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .metric-label {
            font-size: 0.85rem;
            font-weight: 900;
            color: var(--main-dirt);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--dark-grime);
            word-wrap: break-word;
        }

        /* Center AUM Styling */
        .metric-main {
            flex: 1.5;
            background: var(--main-dirt);
            border: 3px solid var(--dark-grime);
            transform: scale(1.02);
            box-shadow: 4px 4px 0px var(--dark-grime);
        }
        .metric-main .metric-label {
            font-size: 1rem;
            color: var(--dirty-white);
            text-shadow: 1px 1px 1px var(--dark-grime);
        }
        .metric-main .metric-value {
            font-size: 2.2rem;
            color: var(--dirty-white);
            font-weight: 900;
            text-shadow: 2px 2px 0px var(--dark-grime);
            animation: pulse 3s infinite ease-in-out;
            will-change: transform;
        }

        /* Main Grid: 2 columns */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        /* --- HUD PANELS (CARDBOARD BOXES) --- */
        .hud-panel {
            background: var(--light-rubbish);
            border-radius: 10px;
            padding: 25px 20px 20px 20px;
            box-shadow: 3px 3px 0px var(--main-dirt);
            border: 2px solid var(--dark-grime);
            position: relative;
            width: 100%;
        }
        
        .hud-title {
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--main-dirt);
            color: var(--dirty-white);
            padding: 6px 16px;
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-radius: 5px;
            box-shadow: 2px 2px 0px var(--dark-grime);
            border: 2px solid var(--dark-grime);
            white-space: nowrap;
            z-index: 2;
            transform: rotate(-2deg); /* Slight tilt for a thrown-together look */
        }

        #returns-table-container, #graph-container {
            width: 100%;
            overflow-x: auto;
        }

        /* --- HOLDINGS TABLE (DIRTY CARDS) --- */
        .holdings-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px; 
            width: 100%;
            margin-top: 10px;
        }

        .holding-card {
            background: var(--dirty-white);
            border: 2px dashed var(--main-dirt);
            padding: 8px 10px; 
            border-radius: 5px; 
            min-width: 0; 
            cursor: pointer;
            width: 100%;
        }

        .holding-name {
            font-weight: 900;
            font-size: 0.9rem; 
            color: var(--dark-grime);
            display: block;
            margin-bottom: 4px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .holding-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem; 
            font-weight: 700;
            margin-bottom: 2px; 
        }
        
        /* --- CHART STYLING --- */
        svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }
        .chart-tooltip {
            position: absolute;
            background: var(--main-dirt);
            color: var(--dirty-white);
            border: 2px solid var(--dark-grime);
            border-radius: 5px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            z-index: 100;
            box-shadow: 2px 2px 0px var(--dark-grime);
            white-space: nowrap;
        }
        .pie-slice {
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            transform-origin: center;
            stroke: var(--dark-grime);
            stroke-width: 1px;
        }
        .pie-slice:hover { 
            opacity: 0.9; 
            transform: scale(1.02);
        }
        
        .line-path {
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: drawLine 2.5s ease-out forwards;
            filter: drop-shadow(0px 2px 2px var(--dark-grime));
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        /* --- RETURNS TABLE --- */
        .returns-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.95rem;
            margin-top: 10px;
            min-width: 250px; 
        }
        .returns-table td, .returns-table th {
            border-bottom: 2px dotted var(--main-dirt);
            padding: 14px; 
            text-align: left;
            font-weight: 700;
        }
        .returns-table th { 
            color: var(--main-dirt);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid var(--main-dirt);
        }
        .returns-table td:last-child, .returns-table th:last-child {
            text-align: right;
        }
        .returns-table tr:last-child td {
            border-bottom: none;
        }

        /* --- TYPING CURSOR (🗑️) --- */
        .cursor::after {
            content: ' 🗑️';
            animation: blink 1s step-end infinite;
            display: inline-block;
            vertical-align: middle;
            margin-bottom: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- LOGS (SCRAP PAPER BUBBLES) --- */
        #updatesContainer {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .update-entry {
            background: var(--dirty-white);
            color: var(--dark-grime);
            padding: 12px 16px;
            border-radius: 2px;
            border-bottom-left-radius: 10px;
            font-weight: 700;
            box-shadow: 2px 2px 0px var(--main-dirt);
            border: 1px solid var(--main-dirt);
            display: inline-block;
            max-width: 100%;
            position: relative;
            cursor: pointer;
            word-wrap: break-word;
            transform: rotate(1deg); /* Slight rotation */
        }
        
        .log-buy { background: #8f9c82; color: var(--dark-grime); border: 2px solid var(--muted-green); }
        .log-sell { background: #a88c8c; color: var(--dark-grime); border: 2px solid var(--accent-rust); }
        .log-paid { background: #b8ad9e; color: var(--dark-grime); border: 2px solid var(--main-dirt); }

        /* Poll Container & Button */
        .poll-wrapper {
            background: var(--light-rubbish);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 3px 3px 0px var(--main-dirt);
            border: 2px solid var(--dark-grime);
            text-align: center;
            margin-top: 2rem;
            width: 100%;
        }

        .squad-btn {
            background: var(--main-dirt);
            color: var(--dirty-white);
            border: 2px solid var(--dark-grime);
            border-radius: 5px;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 3px 3px 0px var(--dark-grime);
            transition: transform 0.1s, box-shadow 0.1s;
            margin-bottom: 15px;
            font-family: var(--font-family);
            width: 100%;
            max-width: 300px;
            transform: rotate(-1deg);
        }

        .squad-btn:active {
            transform: scale(0.98) rotate(-1deg);
            box-shadow: 1px 1px 0px var(--dark-grime);
        }

        /* --- EMOJI RAIN ANIMATION --- */
        @keyframes fallAndSpin {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .emoji-drop {
            position: fixed;
            top: -10vh;
            z-index: 9999;
            pointer-events: none;
            animation: fallAndSpin linear forwards;
            will-change: transform, opacity;
            filter: grayscale(0.5) sepia(0.3); /* Make em dirty */
        }

        /* =========================================
           📱 MOBILE RESPONSIVE MEDIA QUERIES 📱 
           ========================================= */
        @media (max-width: 800px) {
            .dashboard-grid { 
                grid-template-columns: 1fr; 
                gap: 2.5rem; 
            }
            .main-container { 
                padding: 15px 10px; 
            } 
            .metric-main { 
                transform: scale(1); 
            }
        }

        @media (max-width: 600px) {
            body {
                font-size: 13px;
            }
            .main-container {
                padding: 10px 5px;
            }
            .tagline {
                font-size: 1.1rem;
            }
            .metrics-container {
                flex-direction: column; 
                gap: 10px;
            }
            .metric-item {
                width: 100%;
                min-width: unset;
                padding: 10px 8px;
            }
            .metric-label {
                font-size: 0.75rem;
            }
            .metric-value {
                font-size: 1.15rem;
            }
            .metric-main .metric-value {
                font-size: 1.6rem;
            }
            .hud-panel {
                padding: 25px 10px 15px 10px;
            }
            .hud-title {
                font-size: 0.8rem;
                padding: 5px 12px;
                left: 10px;
            }
            .returns-table td, .returns-table th {
                padding: 10px 5px; 
                font-size: 0.85rem;
            }
            #pie-chart-container {
                width: 100% !important; 
            }
            .update-entry {
                font-size: 0.85rem;
                padding: 10px 12px;
            }
            .squad-btn {
                font-size: 0.95rem;
                padding: 10px 20px;
            }
        }

    </style>
</head>

<script>
    // --- DOM ELEMENTS ---
    const tickerWrapEl = document.getElementById('ticker-wrap');
    const tickerTextEl = document.getElementById('ticker-text');
    const loadingContainerEl = document.getElementById('loading-container');
    const loadingTextEl = document.getElementById('loading-text');
    const metricsContainerEl = document.getElementById('metrics-container');
    
    const aumTextEl = document.getElementById('aum-text');
    const unitPriceTextEl = document.getElementById('unitprice-text');
    const tendiesTextEl = document.getElementById('tendies-text');
    
    const tableContainerEl = document.getElementById('table-container');
    const pieChartContainerEl = document.getElementById('pie-chart-container');
    const returnsTableContainerEl = document.getElementById('returns-table-container');
    const graphContainerEl = document.getElementById('graph-container');
    const tooltipEl = document.getElementById('tooltip');

    const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvIkFEd8DqGzQOSMan7QNAuwDI4fXgD1HB8PDbmnnqk5QmA0YNigbxyWuuKhoAys9VRKrbDqym2xDw/pub?output=csv';

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // --- SECURITY UTILITY ---
    // Safely escapes characters that could trigger XSS if injected into innerHTML
    function escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }

    // --- UTILITIES ---
    async function typeText(element, text, speed = 30) {
        element.classList.add('cursor');
        element.innerHTML = "";
        let currentText = "";
        for (let i = 0; i < text.length; i++) {
            currentText += escapeHTML(text.charAt(i));
            element.innerHTML = currentText;
            await sleep(speed + Math.random() * 20);
        }
        element.classList.remove('cursor');
    }

    async function typeDots(element, count = 3, speed = 300) {
        element.classList.add('cursor');
        for (let i = 0; i < count; i++) {
            element.textContent += '.';
            await sleep(speed);
        }
        element.classList.remove('cursor');
    }

    function parseCSV(str) {
        const arr = [];
        let quote = false; 
        let col, c;
        for (let row = col = c = 0; c < str.length; c++) {
            const cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';

            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }
            
            arr[row][col] += cc;
        }
        return arr;
    }

    async function getSheetData() {
        try {
            const response = await fetch(SPREADSHEET_URL);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const csvText = await response.text();
            return parseCSV(csvText);
        } catch (e) {
            console.error("Error:", e);
            loadingTextEl.textContent = "🐀 RATS ATE THE DATA CABLE! 🐀";
            return null;
        }
    }

    // --- RENDERERS ---

    function drawTable(data) {
        const holdings = data.slice(2).filter(row => row[0]);
        const fmtUSD0 = (n) => {
            const num = parseFloat(n);
            if (isNaN(num)) return escapeHTML(n) || '$0';
            return num.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
        };
        const fmtPct = (v) => {
            const raw = (v ?? '').toString().trim();
            if (raw === '') return '0%';
            if (raw.endsWith('%')) return escapeHTML(raw);
            const num = parseFloat(raw);
            return isNaN(num) ? escapeHTML(raw) : `${num.toFixed(2)}%`;
        };

        let html = '<div class="holdings-grid-container">';
        
        // Helper function for standard cards
        const createCard = (item) => {
            if(!item) return '';
            const name = escapeHTML(item[0] || 'N/A');
            const value = fmtUSD0(item[3]); 
            const dailyChange = fmtPct(item[13]); 
            const profit = fmtPct(item[6]);
            
            const dailyVal = parseFloat(dailyChange);
            const profitVal = parseFloat(profit);

            // --- HEATMAP LOGIC BASED ON DAILY CHANGE ---
            let bgStyle = 'background: var(--dirty-white); border-color: var(--main-dirt);'; // default
            if (!isNaN(dailyVal) && dailyChange !== '0%') {
                if (dailyVal > 0) {
                    // Dirty green for positive
                    bgStyle = `background: #7a8c69; border-color: var(--muted-green); border-style: solid;`;
                } else if (dailyVal < 0) {
                    // Dirty red for negative
                    bgStyle = `background: #a87c7c; border-color: var(--accent-rust); border-style: solid;`;
                }
            }

            const profitColor = profitVal < 0 ? 'var(--accent-rust)' : 'var(--muted-green)';
            const dailyColor = dailyVal < 0 ? 'var(--accent-rust)' : (dailyVal > 0 ? 'var(--muted-green)' : 'var(--dark-grime)');

            return `
                <div class="holding-card wiggle-hover" style="${bgStyle}">
                    <span class="holding-name" title="${name}">${name}</span>
                    <div class="holding-row"><span>Val:</span><span>${value}</span></div>
                    <div class="holding-row"><span>P/L:</span><span style="color:${profitColor}">${profit}</span></div>
                    <div class="holding-row"><span>Day:</span><span style="color:${dailyColor}; font-weight:900;">${dailyChange}</span></div>
                </div>
            `;
        }

        // Special handling for the very first item (Cash)
        if (holdings.length > 0) {
            const cashItem = holdings[0];
            const name = escapeHTML(cashItem[0] || 'Cash');
            const value = fmtUSD0(cashItem[3]); // Cell D3 value

            // Add the cash card spanning 2 columns
            html += `
                <div class="holding-card wiggle-hover" style="grid-column: 1 / -1; background: var(--light-rubbish); border: 2px dashed var(--main-dirt); text-align: center; padding: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 2px 2px 0px var(--dark-grime);">
                    <span class="holding-name" title="${name}" style="font-size: 1.1rem; color: var(--accent-rust); margin-bottom: 2px;">${name}</span>
                    <div style="font-size: 1.7rem; font-weight: 900; color: var(--dark-grime); text-shadow: 1px 1px 1px rgba(0,0,0,0.1);">${value}</div>
                </div>
            `;
        }
        
        // Loop through the remaining holdings standardly
        for (let i = 1; i < holdings.length; i++) {
            if(holdings[i] && holdings[i][0]) html += createCard(holdings[i]);
        }

        // --- NEW: DEBT CARD AT THE BOTTOM ---
        // Pulls from Cell G2 (Row Index 1, Column Index 6)
        const debtRaw = data[1] ? data[1][6] : undefined;
        const debtValue = debtRaw ? fmtUSD0(debtRaw) : '$0';
        
        html += `
            <div class="holding-card wiggle-hover" style="grid-column: 1 / -1; background: var(--light-rubbish); border: 2px dashed var(--accent-rust); text-align: center; padding: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 2px 2px 0px var(--dark-grime); margin-top: 4px;">
                <span class="holding-name" title="DEBT" style="font-size: 1.1rem; color: var(--accent-rust); margin-bottom: 2px;">DEBT</span>
                <div style="font-size: 1.7rem; font-weight: 900; color: var(--dark-grime); text-shadow: 1px 1px 1px rgba(0,0,0,0.1);">${debtValue}</div>
            </div>
        `;

        html += '</div>';
        tableContainerEl.innerHTML = html;
    }

    function drawPieChart(data) {
        const holdingsData = data.slice(2)
            .filter(row => row[0] && parseFloat(row[3]) > 0)
            .map(row => ({ name: row[0], value: parseFloat(row[3]) }));

        const totalValue = holdingsData.reduce((sum, item) => sum + item.value, 0);
        if (totalValue === 0) {
            pieChartContainerEl.innerHTML = '<div style="text-align:center; font-weight:bold;">NO ASSETS 🥺</div>';
            return;
        }

        const radius = 100;
        const cx = radius;
        const cy = radius;
        let startAngle = -90;

        let svgContent = `<svg viewBox="-5 -5 ${radius * 2 + 10} ${radius * 2 + 10}" preserveAspectRatio="xMidYMid meet">`;

        // Broke/Dirty Palette
        const dirtyColors = ['#8c7b6a', '#a39078', '#7c644d', '#5a4a3a', '#bba998', '#6d5c4c'];

        holdingsData.forEach((item, index) => {
            const percentage = item.value / totalValue;
            const angle = percentage * 360;
            const endAngle = startAngle + angle;

            const start = polarToCartesian(cx, cy, radius, endAngle);
            const end = polarToCartesian(cx, cy, radius, startAngle);
            const largeArcFlag = angle > 180 ? "1" : "0";

            const d = [
                "M", cx, cy,
                "L", end.x, end.y,
                "A", radius, radius, 0, largeArcFlag, 1, start.x, start.y,
                "Z"
            ].join(" ");

            const fill = dirtyColors[index % dirtyColors.length];
            const cleanName = escapeHTML(item.name);
            // Must escape quotes for tooltip inline JS string
            const tooltipText = escapeHTML(`${cleanName}: ${item.value.toLocaleString('en-US', {style:'currency', currency:'USD', maximumFractionDigits:0})} (${Math.round(percentage*100)}%)`).replace(/'/g, "\\'");

            svgContent += `<path d="${d}" fill="${fill}" class="pie-slice" 
                                   ontouchstart="showTooltip(event.touches[0], '${tooltipText}')"
                                   onmousemove="showTooltip(evt, '${tooltipText}')" 
                                   onmouseout="hideTooltip()"></path>`;
            
            startAngle = endAngle;
        });

        svgContent += `</svg>`;
        pieChartContainerEl.innerHTML = svgContent;
    }

    function showTooltip(evt, text) {
        tooltipEl.style.display = "block";
        tooltipEl.innerHTML = text; // Safely mapped previously
        tooltipEl.style.left = (evt.pageX + 10) + 'px';
        tooltipEl.style.top = (evt.pageY + 10) + 'px';
    }

    function hideTooltip() {
        tooltipEl.style.display = "none";
    }

    function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
        const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
        return {
            x: centerX + (radius * Math.cos(angleInRadians)),
            y: centerY + (radius * Math.sin(angleInRadians))
        };
    }

    function drawLineGraph(data) {
        const graphData = data.slice(1)
            .filter(row => row[7] && row[8])
            .map(row => {
                const dateParts = row[7].split('/');
                return {
                    date: new Date(`${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`),
                    value: parseFloat(row[8])
                };
            })
            .sort((a, b) => a.date - b.date);

        if (graphData.length < 2) return;

        const width = 800;
        const height = 400;
        const padding = 60;

        const maxValue = Math.max(...graphData.map(d => d.value));
        const yMax = Math.ceil(maxValue / 10000) * 10000;
        
        const startDate = new Date('2017-01-01');
        const today = new Date();
        const theEndDate = new Date(today.getFullYear() + 1, 0, 1);

        const xScale = (date) => padding + ((date - startDate) / (theEndDate - startDate)) * (width - padding * 2);
        const yScale = (value) => height - padding - (value / yMax) * (height - padding * 2);

        let svgContent = `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" style="margin-top: 15px;">`;

        // Axes and Grids
        svgContent += `<line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="var(--main-dirt)" stroke-width="3" stroke-linecap="round"></line>`;
        svgContent += `<line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="var(--main-dirt)" stroke-width="3" stroke-linecap="round"></line>`;

        for (let i = 0; i <= yMax; i += 10000) {
            const y = yScale(i);
            svgContent += `<line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="var(--light-rubbish)" stroke-width="2" stroke-dasharray="6,6"></line>`;
            svgContent += `<text x="${padding - 15}" y="${y + 5}" fill="var(--dark-grime)" text-anchor="end" font-size="16" font-weight="bold">$${i / 1000}K</text>`;
        }

        for (let year = 2017; year <= today.getFullYear() + 1; year++) {
            const x = xScale(new Date(`${year}-01-01`));
            svgContent += `<text x="${x}" y="${height - padding + 25}" fill="var(--dark-grime)" text-anchor="middle" font-size="16" font-weight="bold">${year}</text>`;
        }
        
        const points = graphData.map(d => `${xScale(d.date)},${yScale(d.value)}`).join(' ');
        
        svgContent += `<polyline points="${points}" fill="none" stroke="var(--accent-rust)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" class="line-path"></polyline>`;
        
        svgContent += `</svg>`;
        graphContainerEl.innerHTML = svgContent;
    }

    function drawReturnsTable(data) {
        const safeGet = (r, c) => (data[r] && typeof data[r][c] !== 'undefined') ? escapeHTML(data[r][c]) : '';
        const periods = [
            { label: '1 Month', val: safeGet(1, 11) },
            { label: '3 Month', val: safeGet(2, 11) },
            { label: '6 Month', val: safeGet(3, 11) },
            { label: '1 Year', val: safeGet(4, 11) },
            { label: '2 Year', val: safeGet(5, 11) }
        ];

        let html = '<table class="returns-table">';
        html += '<thead><tr><th>PERIOD</th><th>RETURN</th></tr></thead><tbody>';
        
        periods.forEach(p => {
            let color = 'var(--muted-green)';
            let valStr = p.val;
            if(valStr && valStr.includes('-')) color = 'var(--accent-rust)';
            
            if(!valStr.includes('%') && valStr !== '') {
                const f = parseFloat(valStr);
                if(!isNaN(f)) valStr = f.toFixed(2) + '%';
            }

            html += `<tr><td>${p.label}</td><td style="color:${color}; font-weight:900; font-size:1.1rem;">${valStr}</td></tr>`;
        });
        html += '</tbody></table>';
        returnsTableContainerEl.innerHTML = html;
    }

    function loadPortfolioUpdates(data) {
        const updates = data.slice(1)
            .map(row => row[9])
            .filter(item => item && item.trim() !== '');

        const container = document.getElementById('updatesContainer');
        container.innerHTML = '';

        if (updates.length === 0) {
            container.innerHTML = '<div style="text-align:center; opacity:0.6; font-weight:bold;">No new junk... 🗑️</div>';
            return;
        }

        updates.forEach((update) => {
            const div = document.createElement('div');
            let extraClass = '';
            let emoji = '📝';
            const upperText = update.toUpperCase();
            
            if (upperText.includes('BUY')) {
                extraClass = 'log-buy'; emoji = '🛒';
            } else if (upperText.includes('SELL') || upperText.includes('SOLD')) {
                extraClass = 'log-sell'; emoji = '💸';
            } else if (upperText.includes('PAID')) {
                extraClass = 'log-paid'; emoji = '🧾';
            }

            div.className = `update-entry wiggle-hover ${extraClass}`;
            // Output sanitised update text
            div.innerHTML = `<span style="margin-right:5px; font-size:1.1rem;">${emoji}</span> ${escapeHTML(update)}`;
            container.appendChild(div);
        });
    }

    // Cache elements outside the function loop to save processing time
    let wobbleElements = [];
    
    // --- RANDOM SPONTANEOUS WOBBLES & POPS ---
    function startRandomWobbles() {
        if(wobbleElements.length === 0) {
            wobbleElements = Array.from(document.querySelectorAll('.hud-panel, .metric-item, .holding-card, .poll-wrapper'));
        }

        if (wobbleElements.length > 0) {
            const numToAnimate = Math.floor(Math.random() * 2) + 1;
            for(let i=0; i<numToAnimate; i++) {
                const el = wobbleElements[Math.floor(Math.random() * wobbleElements.length)];
                if(!el.classList.contains('random-pop')) {
                    el.classList.add('random-pop');
                    setTimeout(() => el.classList.remove('random-pop'), 800);
                }
            }
        }
        
        const nextTime = Math.random() * 3000 + 1500;
        setTimeout(startRandomWobbles, nextTime);
    }

    // --- EMOJI RAIN EFFECT ---
    document.getElementById('emojiRainBtn').addEventListener('click', function(e) {
        e.preventDefault();
        
        // Grimy emojis for the broke theme
        const emojis = ['💸', '📉', '💩', '🏚️', '🗑️', '🪰', '🐀'];
        
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const drop = document.createElement('div');
                drop.classList.add('emoji-drop');
                drop.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
                
                const duration = Math.random() * 2 + 2; 
                drop.style.animationDuration = duration + 's';
                
                document.body.appendChild(drop);
                
                setTimeout(() => drop.remove(), duration * 1000);
            }, i * 40);
        }
    });

    // --- MAIN EXECUTION ---
    async function main() {
        // IMPROVEMENT: Start the fetch process immediately to run parallel with our typing animation. 
        // This halves the apparent load time for users!
        const dataPromise = getSheetData();

        await typeText(loadingTextEl, 'RUMMAGING FOR SCRAPS... 🗑️', 30);
        await typeDots(loadingTextEl, 4, 150);
        await sleep(200);
        
        // Wait for the data fetch that started earlier to finish.
        const sheetData = await dataPromise;
        
        if (!sheetData) return;

        // Populate and display ticker from Cell J1 (Row index 0, Col index 9)
        if (sheetData[0] && sheetData[0].length > 9 && sheetData[0][9]) {
            tickerTextEl.innerHTML = escapeHTML(sheetData[0][9]);
            tickerWrapEl.style.display = 'block';
        }

        loadingTextEl.innerHTML = '';
        await typeText(loadingTextEl, 'FOUND SOME CRUMPLED RECIEPTS... 🧾', 30);
        await typeDots(loadingTextEl, 4, 150);
        await sleep(300);
        
        // --- NEW UP/DOWN TODAY LOGIC ---
        let todayChangeStr = (sheetData[0] && sheetData[0].length > 14 && sheetData[0][14]) ? escapeHTML(sheetData[0][14].trim()) : "$0";
        let todayChangeVal = parseFloat(todayChangeStr.replace(/[^0-9.-]+/g,"")) || 0;

        loadingTextEl.innerHTML = ''; 
        let finalMessage = "";

        if (todayChangeVal >= 0) {
            finalMessage = `YOU MADE ${todayChangeStr} TODAY! LUNCH IS ON YOU! 🥪`;
            loadingTextEl.style.color = 'var(--muted-green)';
        } else {
            finalMessage = `LOST ${todayChangeStr.replace('-', '')} TODAY. RAMEN NOODLES AGAIN. 🍜`;
            loadingTextEl.style.color = 'var(--accent-rust)';
        }
        
        loadingTextEl.style.transition = 'all 0.3s ease';
        
        await typeText(loadingTextEl, finalMessage, 30);
        await sleep(2500); 

        loadingContainerEl.style.display = 'none';
        metricsContainerEl.style.display = 'flex';

        const jokingValue = parseFloat(sheetData[1][3]).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }) || '$0';
        const unitRaw = sheetData[1][4];
        const unitPrice = parseFloat(unitRaw).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
        const tendiesValue = parseFloat(sheetData[1][5]).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }) || '$0';

        aumTextEl.textContent = jokingValue;
        unitPriceTextEl.textContent = unitPrice;
        tendiesTextEl.textContent = tendiesValue;
        
        drawTable(sheetData);
        drawPieChart(sheetData);
        drawReturnsTable(sheetData);
        drawLineGraph(sheetData);
        loadPortfolioUpdates(sheetData);

        setTimeout(startRandomWobbles, 2000);
    }

    window.onload = main;

</script>
